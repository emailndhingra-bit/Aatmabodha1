services:
  db:
    image: postgres:16
    container_name: aatmabodha-postgres
    environment:
      POSTGRES_DB: aatmabodha
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - aatmabodha_pgdata:/var/lib/postgresql/data

volumes:
  aatmabodha_pgdata:

